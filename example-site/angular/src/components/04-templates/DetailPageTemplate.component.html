@if (isLoading() || !meal()) {
	<div class="grid place-items-center h-screen">
		<p class="text-xl">Loading...</p>
	</div>
} @else {
	<app-site-frame-organism>
		<app-screen-padding-atom [padVertical]="true">
			<div class="DetailPageTemplate">
				<h2 class="text-3xl font-bold mb-5">{{ meal()!.name }}</h2>
				<div class="grid gap-4 lg:grid-cols-[2fr_30rem]">
					<div class="grid gap-4 sm:grid-cols-[1fr_2fr]">
						<img [src]="meal()!.image" [alt]="meal()!.name" class="mt-2" />
						<div>
							<h3 class="text-2xl font-bold">Recipe</h3>
							<p class="whitespace-pre-wrap">{{ meal()!.instructions }}</p>
						</div>
					</div>
					<div class="grid gap-4 grid-rows-[auto_1fr] items-start">
						<h3 class="text-2xl font-bold">Ingredients</h3>
						<app-compact-listing-organism [items]="ingredientItems" />
					</div>
				</div>
			</div>
		</app-screen-padding-atom>
	</app-site-frame-organism>
}
