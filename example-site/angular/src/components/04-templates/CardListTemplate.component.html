<app-site-frame-organism>
	<app-screen-padding-atom [padVertical]="true">
		<div class="CardListTemplate grid gap-4">
			<h2 class="text-3xl font-bold">{{ title() }}</h2>
			@if (introText()) {
				<p>{{ introText() }}</p>
			}
			<app-card-listing-organism [cards]="cardList()" />
		</div>
	</app-screen-padding-atom>
</app-site-frame-organism>
