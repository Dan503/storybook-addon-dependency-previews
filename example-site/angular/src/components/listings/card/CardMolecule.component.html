<div class="@container grid">
	<a
		[routerLink]="href()"
		class="h-full flex flex-col gap-2 border rounded-2xl overflow-hidden bg-white focus:bg-teal-200 hover:bg-teal-200 hover:shadow-lg transition-all sm:flex-row"
	>
		<img [src]="imgSrc()" alt="" class="aspect-video object-cover sm:aspect-square sm:w-40" />
		<div class="p-4 w-full">
			<h3 class="text-xl font-bold">{{ title() }}</h3>
			<p class="line-clamp-4">{{ description() }}</p>
		</div>
	</a>
</div>
