<div class="CompactListingMolecule flex items-center gap-3">
	@if (href()) {
		<a [routerLink]="href()" class="flex items-center gap-3 hover:underline">
			@if (imageSrc()) {
				<img [src]="imageSrc()" [alt]="title()" class="w-12 h-12 object-cover rounded" />
			}
			<div>
				<p class="font-semibold">{{ title() }}</p>
				@if (description()) {
					<p class="text-sm text-gray-600">{{ description() }}</p>
				}
			</div>
		</a>
	} @else {
		@if (imageSrc()) {
			<img [src]="imageSrc()" [alt]="title()" class="w-12 h-12 object-cover rounded" />
		}
		<div>
			<p class="font-semibold">{{ title() }}</p>
			@if (description()) {
				<p class="text-sm text-gray-600">{{ description() }}</p>
			}
		</div>
	}
</div>
