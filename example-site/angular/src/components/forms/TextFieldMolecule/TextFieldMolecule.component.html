<div class="TextFieldMolecule grid gap-1">
	<label class="font-semibold">{{ label() }}</label>
	@if (control()) {
		<input
			[formControl]="$any(control())"
			[placeholder]="placeholder()"
			class="border-2 border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-teal-500"
			[class.border-red-400]="control()?.invalid && control()?.touched"
		/>
	} @else {
		<input
			[placeholder]="placeholder()"
			class="border-2 border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-teal-500"
		/>
	}
	<app-error-list-molecule [errors]="errors" />
</div>
