<div class="TextAreaMolecule grid gap-1">
	<label class="font-semibold">{{ label() }}</label>
	@if (control()) {
		<textarea
			[formControl]="$any(control())"
			[placeholder]="placeholder()"
			rows="4"
			class="border-2 border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-teal-500 resize-y"
			[class.border-red-400]="control()?.invalid && control()?.touched"
		></textarea>
	} @else {
		<textarea
			[placeholder]="placeholder()"
			rows="4"
			class="border-2 border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-teal-500 resize-y"
		></textarea>
	}
	<app-error-list-molecule [errors]="errors" />
</div>
