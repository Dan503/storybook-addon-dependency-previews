<div class="BgImageContainerAtom relative" [class]="className()">
	<img
		[src]="imgSrc()"
		[alt]="altText()"
		class="object-cover h-full w-full absolute top-0 left-0"
	/>
	<div
		class="h-full w-full absolute top-0 left-0"
		[ngStyle]="{ 'background-color': tintColor(), opacity: tintPercent() / 100 }"
	></div>
	<div class="grid relative z-10" [class]="innerClassName()">
		<ng-content />
	</div>
</div>
