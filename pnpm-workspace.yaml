packages:
  - 'storybook-addon-package' # ← The addon package that gets published to npm
  - 'example-site/shared' # ← shared data and utils
  - 'example-site/react' # ← React demo app
  - 'example-site/svelte' # ← Svelte demo app
  - 'example-site/angular' # ← Angular demo app
  - 'example-site/vue' # ← Vue demo app (currently throwaway plain Vue + Vite; will become Nuxt-powered in a follow-up PR)
  - 'example-site/solid' # ← Solid demo app (SolidStart + storybook-solidjs-vite)
onlyBuiltDependencies:
  - esbuild
patchedDependencies:
  '@formisch/react@0.4.5': patches/@formisch__react@0.4.5.patch
  '@storybook/vue3-vite@10.4.1': patches/@storybook__vue3-vite@10.4.1.patch
peerDependencyRules:
  allowedVersions:
    # @angular-devkit/core@21 peer dep declaration hasn't caught up to chokidar v5 yet
    chokidar: '5'
